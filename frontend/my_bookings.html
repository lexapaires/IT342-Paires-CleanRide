<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanRide - My Bookings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        body {
            background: #f8fafc;
            padding: 0;
            display: flex;
            align-items: stretch;
            font-family: 'Inter', sans-serif;
        }
        .bubble { display: none; }
        
        .main-content {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
        }

        .header {
            margin-bottom: 32px;
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .receipts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* Receipt Card Styling based on user_bookslot.html Modal */
        .receipt-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .receipt-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #cbd5e1;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 99px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending { background: #fef08a; color: #854d0e; }
        .status-confirmed { background: #dcfce7; color: #166534; }
        .status-completed { background: #e0e7ff; color: #3730a3; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }

        .priority-box {
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .priority-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .priority-number {
            font-size: 22px;
            font-weight: 900;
            color: #2563eb;
            letter-spacing: 1px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #475569;
            margin-bottom: 10px;
        }

        .info-row strong {
            color: #0f172a;
        }

        .total-row {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-price {
            font-size: 20px;
            font-weight: 800;
            color: #2563eb;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            background: white;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
            grid-column: 1 / -1;
        }
        
        .empty-state h3 {
            color: #0f172a;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" style="width: 250px;">
        <div class="brand-placeholder" style="cursor: pointer;" onclick="window.location.href='dashboard.html'">
            <div class="brand-logo"><img src="LOGO.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"></div>
            CleanRide
        </div>
        <div class="nav-section">
            <div class="nav-title">Main Menu</div>
            <a href="dashboard.html" class="nav-link">Overview</a>
            <a href="dashboard.html" class="nav-link">Booking Calendar</a>
            <a href="my_bookings.html" class="nav-link active">My Bookings</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div class="header-title">
                <h1>My Bookings</h1>
                <p>View your upcoming and past carwash appointments.</p>
            </div>
        </div>

        <div class="receipts-grid" id="bookingsGrid">
            <div class="empty-state" style="display: none;" id="loadingState">
                Loading your bookings...
            </div>
        </div>
    </main>

    <script>
        const SLOT_MAP = {
            1: '08:00 AM', 2: '09:30 AM', 3: '11:00 AM',
            4: '12:30 PM', 5: '02:00 PM', 6: '03:30 PM',
            7: '05:00 PM', 8: '06:30 PM', 9: '08:00 PM'
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const userDataString = localStorage.getItem('userProfile');
            if (!userDataString) {
                alert("Please log in first to view your bookings.");
                window.location.href = 'index.html';
                return;
            }
            const userData = JSON.parse(userDataString);
            const grid = document.getElementById('bookingsGrid');

            grid.innerHTML = '<div class="empty-state" id="loadingState">Loading your bookings...</div>';

            try {
                const response = await fetch(`http://localhost:8081/api/v1/bookings/user/${userData.id}`);
                if (!response.ok) throw new Error("Failed to load bookings");
                
                const bookings = await response.json();
                
                if (bookings.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <h3>No bookings found</h3>
                            <p>You haven't made any carwash reservations yet.</p>
                            <button class="btn-primary" style="margin-top: 16px;" onclick="window.location.href='dashboard.html'">Book a Slot</button>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';
                
                bookings.forEach(booking => {
                    const statusClass = "status-" + booking.status.toLowerCase();
                    const formattedSvc = booking.serviceType ? booking.serviceType.replace('_', ' ') : 'Unknown';
                    const formattedVeh = booking.vehicleType ? booking.vehicleType.replace(/_/g, ' ') : 'Unknown';
                    const timeStr = SLOT_MAP[booking.timeSlot] || "Unknown Time";
                    
                    const card = document.createElement('div');
                    card.className = "receipt-card";
                    card.innerHTML = `
                        <div class="receipt-header">
                            <span style="font-weight: 700; color: #0f172a;">${booking.bookingDate}</span>
                            <span class="status-badge ${statusClass}">${booking.status}</span>
                        </div>
                        
                        <div class="priority-box">
                            <div class="priority-label">Priority Number</div>
                            <div class="priority-number">${booking.priorityNumber || '--'}</div>
                            <div style="font-size: 11px; color: #94a3b8; margin-top: 4px;">Bay: ${booking.bayId || 'TBD'}</div>
                        </div>

                        <div class="info-row">
                            <span>Time Slot</span>
                            <strong>${timeStr}</strong>
                        </div>
                        <div class="info-row">
                            <span>Service</span>
                            <strong>${formattedSvc}</strong>
                        </div>
                        <div class="info-row">
                            <span>Vehicle Size</span>
                            <strong>${formattedVeh}</strong>
                        </div>

                        <div class="total-row">
                            <span style="font-weight: 600; color: #64748b;">Total Amount</span>
                            <span class="total-price">₱${booking.totalPrice}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3 style="color: #ef4444;">Connection Error</h3>
                        <p>Could not connect to the Backend API. Make sure Spring Boot is running.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
