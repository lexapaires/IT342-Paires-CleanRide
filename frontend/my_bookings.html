<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanRide - My Bookings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        body {
            background: #f8fafc;
            padding: 0;
            display: flex;
            align-items: stretch;
            font-family: 'Inter', sans-serif;
        }
        .bubble { display: none; }
        
        .main-content {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
        }

        .header {
            margin-bottom: 32px;
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .receipts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* Receipt Card Styling based on user_bookslot.html Modal */
        .receipt-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .receipt-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px dashed #cbd5e1;
        }

        .status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 99px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-confirmed, .status-pending, .status-active { background: #fef08a; color: #854d0e; }
        .status-ongoing { background: #e0e7ff; color: #3730a3; }
        .status-completed { background: #dcfce7; color: #166534; }
        .status-canceled, .status-cancelled { background: #fee2e2; color: #991b1b; }

        .priority-box {
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .priority-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .priority-number {
            font-size: 22px;
            font-weight: 900;
            color: #2563eb;
            letter-spacing: 1px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #475569;
            margin-bottom: 10px;
        }

        .info-row strong {
            color: #0f172a;
        }

        .total-row {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-price {
            font-size: 20px;
            font-weight: 800;
            color: #2563eb;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            background: white;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
            grid-column: 1 / -1;
        }
        
        .empty-state h3 {
            color: #0f172a;
            margin-bottom: 8px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-container {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: translateY(20px) scale(0.95);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .modal-overlay.active .modal-container {
            transform: translateY(0) scale(1);
        }

        .modal-icon {
            width: 56px;
            height: 56px;
            background: #fee2e2;
            color: #dc2626;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .modal-content h3 {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
        }

        .modal-content p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
            color: #0f172a;
        }

        .btn-confirm {
            background: #ef4444;
            color: white;
        }

        .btn-confirm:hover {
            background: #dc2626;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" style="width: 250px;">
        <div class="brand-placeholder" style="cursor: pointer;" onclick="window.location.href='dashboard.html'">
            <div class="brand-logo"><img src="LOGO.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"></div>
            CleanRide
        </div>
        <div class="nav-section">
            <div class="nav-title">Main Menu</div>
            <a href="dashboard.html" class="nav-link">Overview</a>
            <a href="dashboard.html" class="nav-link">Booking Calendar</a>
            <a href="my_bookings.html" class="nav-link active">My Bookings</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div class="header-title">
                <h1>My Bookings</h1>
                <p>View your upcoming and past carwash appointments.</p>
            </div>
        </div>

        <div class="receipts-grid" id="bookingsGrid">
            <div class="empty-state" style="display: none;" id="loadingState">
                Loading your bookings...
            </div>
        </div>
    </main>

    <!-- Cancellation Modal Overlay -->
    <div class="modal-overlay" id="cancelModal">
        <div class="modal-container">
            <div class="modal-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <div class="modal-content">
                <h3>Cancel Booking</h3>
                <p>Are you sure you want to cancel this booking?<br>This action cannot be undone.</p>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeCancelModal()">No, Keep it</button>
                <button class="btn-confirm" onclick="confirmCancelBooking()">Yes, Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SLOT_MAP = {
            1: '08:00 AM', 2: '09:30 AM', 3: '11:00 AM',
            4: '12:30 PM', 5: '02:00 PM', 6: '03:30 PM',
            7: '05:00 PM', 8: '06:30 PM', 9: '08:00 PM'
        };
        const SLOT_HOURS = { 1: 8, 2: 9, 3: 11, 4: 12, 5: 14, 6: 15, 7: 17, 8: 18, 9: 20 };
        const SLOT_MINUTES = { 1: 0, 2: 30, 3: 0, 4: 30, 5: 0, 6: 30, 7: 0, 8: 30, 9: 0 };

        document.addEventListener('DOMContentLoaded', async () => {
            const userDataString = localStorage.getItem('userProfile');
            if (!userDataString) {
                alert("Please log in first to view your bookings.");
                window.location.href = 'index.html';
                return;
            }
            const userData = JSON.parse(userDataString);
            const grid = document.getElementById('bookingsGrid');

            grid.innerHTML = '<div class="empty-state" id="loadingState">Loading your bookings...</div>';

            try {
                const response = await fetch(`http://localhost:8081/api/v1/bookings/user/${userData.id}`);
                if (!response.ok) throw new Error("Failed to load bookings");
                
                const bookings = await response.json();
                
                if (bookings.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <h3>No bookings found</h3>
                            <p>You haven't made any carwash reservations yet.</p>
                            <button class="btn-primary" style="margin-top: 16px;" onclick="window.location.href='dashboard.html'">Book a Slot</button>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';
                
                bookings.forEach(booking => {
                    const [year, month, day] = booking.bookingDate.split('-');
                    const scheduledTime = new Date(year, month - 1, day, SLOT_HOURS[booking.timeSlot] || 0, SLOT_MINUTES[booking.timeSlot] || 0);
                    const now = new Date();
                    const endTime = new Date(scheduledTime.getTime() + 90 * 60000);

                    if (booking.status !== 'CANCELLED' && booking.status !== 'CANCELED') {
                        if (now >= endTime) {
                            booking.status = 'COMPLETED';
                        } else if (now >= scheduledTime && now < endTime) {
                            booking.status = 'ONGOING';
                        } else {
                            booking.status = 'CONFIRMED';
                        }
                    } else {
                        booking.status = 'CANCELED';
                    }

                    const statusClass = "status-" + booking.status.toLowerCase();
                    const formattedSvc = booking.serviceType ? booking.serviceType.replace('_', ' ') : 'Unknown';
                    const formattedVeh = booking.vehicleType ? booking.vehicleType.replace(/_/g, ' ') : 'Unknown';
                    const timeStr = SLOT_MAP[booking.timeSlot] || "Unknown Time";

                    let cancelBtnHtml = '';
                    if (booking.status === 'CONFIRMED') {
                        cancelBtnHtml = `<button class="btn-secondary" style="margin-top: 16px; width: 100%; color: #dc2626; border-color: #fecaca; background: #fef2f2; font-weight: 600; padding: 10px; cursor: pointer;" onclick="cancelBooking(${booking.id})">Cancel Booking</button>`;
                    }
                    
                    const card = document.createElement('div');
                    card.className = "receipt-card";
                    card.innerHTML = `
                        <div class="receipt-header">
                            <span style="font-weight: 700; color: #0f172a;">${booking.bookingDate}</span>
                            <span class="status-badge ${statusClass}">${booking.status}</span>
                        </div>
                        
                        <div class="priority-box">
                            <div class="priority-label">Priority Number</div>
                            <div class="priority-number">${booking.priorityNumber || '--'}</div>
                            <div style="font-size: 11px; color: #94a3b8; margin-top: 4px;">Bay: ${booking.bayId || 'TBD'}</div>
                        </div>

                        <div class="info-row">
                            <span>Time Slot</span>
                            <strong>${timeStr}</strong>
                        </div>
                        <div class="info-row">
                            <span>Service</span>
                            <strong>${formattedSvc}</strong>
                        </div>
                        <div class="info-row">
                            <span>Vehicle Size</span>
                            <strong>${formattedVeh}</strong>
                        </div>

                        <div class="total-row">
                            <span style="font-weight: 600; color: #64748b;">Total Amount</span>
                            <span class="total-price">₱${booking.totalPrice}</span>
                        </div>
                        ${cancelBtnHtml}
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3 style="color: #ef4444;">Connection Error</h3>
                        <p>Could not connect to the Backend API. Make sure Spring Boot is running.</p>
                    </div>
                `;
            }
        });

        let bookingIdToCancel = null;

        window.cancelBooking = function(bookingId) {
            bookingIdToCancel = bookingId;
            document.getElementById('cancelModal').classList.add('active');
        };

        window.closeCancelModal = function() {
            bookingIdToCancel = null;
            document.getElementById('cancelModal').classList.remove('active');
        };

        window.confirmCancelBooking = async function() {
            if (!bookingIdToCancel) return;
            
            const btn = document.querySelector('.btn-confirm');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Canceling...';
            btn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:8081/api/v1/bookings/' + bookingIdToCancel + '/cancel', {
                    method: 'POST'
                });
                
                if (response.ok) {
                    location.reload();
                } else {
                    const errorTxt = await response.text();
                    alert("Cannot cancel booking: " + errorTxt);
                    closeCancelModal();
                }
            } catch (err) {
                console.error(err);
                alert("Network error. Please try again.");
                closeCancelModal();
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
