<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanRide - Dashboard</title>
    <!-- We keep the main style for some global overrides if necessary but heavily rely on dashboard.css -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Overriding style.css body to match dashboard layout */
        body {
            background: #f8fafc;
            padding: 0;
            display: flex;
            align-items: stretch;
        }
        .bubble { display: none; } /* Hide bubbles from login page */
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand-placeholder">
            <div class="brand-logo"><img src="LOGO.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"></div>
            CleanRide
        </div>
        
        <div class="nav-section">
            <div class="nav-title">Main Menu</div>
            <a href="#" class="nav-link">Overview</a>
            <a href="#" class="nav-link active">Booking Calendar</a>
            <a href="my_bookings.html" class="nav-link">My Bookings</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </div>

        <div id="userLiveBayWidget" style="padding: 16px; margin: 0 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; display: none;">
            <div style="font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; margin-bottom: 8px;">My Live Booking</div>
            <div id="userLiveBayContent">
                <!-- dynamic content -->
            </div>
        </div>

        <div class="sidebar-calendar" id="sidebarCalendarContainer">
            <!-- Dynamically injected via JS -->
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div class="header-title">
                <h1>5-Bay Slot Picker</h1>
                <p>Select an available time slot below to secure your carwash booking.</p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary">Filters</button>
                <button class="btn-primary" id="bookSlotBtn">+ Book Slot</button>
            </div>
        </div>

        <div class="slot-grid-container">
            <div class="tabs-row">
                <div class="tabs">
                    <button class="tab active">All Bays</button>
                    <button class="tab">Available</button>
                    <button class="tab">Express Only</button>
                </div>
                <div class="date-indicator">
                    Showing slots for <strong id="selectedDateDisplay">Thursday, Oct 5th</strong>
                </div>
            </div>

            <div class="grid-9" id="bookingSlotsContainer">
                <!-- Dynamically injected via JS -->
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initUserLiveTracker();
            
            const calendarContainer = document.getElementById('sidebarCalendarContainer');
            const dateDisplay = document.getElementById('selectedDateDisplay');
            
            let currentDate = new Date();
            currentDate.setDate(1); // Set to 1st to prevent month-skip bugs
            let selectedDate = new Date(); // Defaults to today

            function renderCalendar() {
                calendarContainer.innerHTML = '';
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();

                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

                // Header
                const header = document.createElement('div');
                header.className = 'calendar-header';
                
                const prevBtn = document.createElement('button');
                prevBtn.className = 'calendar-nav-btn';
                prevBtn.innerHTML = '‹';
                prevBtn.onclick = () => { 
                    currentDate.setMonth(currentDate.getMonth() - 1); 
                    renderCalendar(); 
                };

                const nextBtn = document.createElement('button');
                nextBtn.className = 'calendar-nav-btn';
                nextBtn.innerHTML = '›';
                nextBtn.onclick = () => { 
                    currentDate.setMonth(currentDate.getMonth() + 1); 
                    renderCalendar(); 
                };

                const title = document.createElement('span');
                title.innerText = `${monthNames[month]} ${year}`;

                header.appendChild(prevBtn);
                header.appendChild(title);
                header.appendChild(nextBtn);
                calendarContainer.appendChild(header);

                // Grid
                const grid = document.createElement('div');
                grid.className = 'calendar-grid';

                const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
                days.forEach(day => {
                    const el = document.createElement('div');
                    el.className = 'calendar-day-header';
                    el.innerText = day;
                    grid.appendChild(el);
                });

                // Empty slots before 1st
                for (let i = 0; i < firstDay; i++) {
                    const el = document.createElement('div');
                    el.className = 'calendar-day empty';
                    grid.appendChild(el);
                }

                // Real today Date object (midnight comparison)
                const realToday = new Date();
                realToday.setHours(0, 0, 0, 0);

                // Days
                for (let i = 1; i <= daysInMonth; i++) {
                    const el = document.createElement('div');
                    el.className = 'calendar-day';
                    el.innerText = i;

                    const cellDate = new Date(year, month, i);
                    cellDate.setHours(0, 0, 0, 0);

                    // Highlight today
                    if (cellDate.getTime() === realToday.getTime()) {
                        el.classList.add('today');
                    }

                    // Disable past dates
                    if (cellDate.getTime() < realToday.getTime()) {
                        el.classList.add('disabled');
                    } else {
                        // Only attach click handler if it's today or a future date
                        el.onclick = () => {
                            selectedDate = new Date(year, month, i);
                            
                            // Update display text
                            const options = { weekday: 'long', month: 'short', day: 'numeric' };
                            let dateString = selectedDate.toLocaleDateString('en-US', options);
                            
                            // Add ordinal indicator (st, nd, rd, th)
                            const d = selectedDate.getDate();
                            const suffix = ["th", "st", "nd", "rd"][d % 10 > 3 ? 0 : (d % 100 - d % 10 != 10) * d % 10];
                            dateString = dateString.replace(d, d + suffix);

                            dateDisplay.innerText = dateString;
                            renderCalendar(); // Re-render to highlight selected
                            fetchSlots(selectedDate); // Fetch new slots when date changes
                        };
                    }

                    // Highlight selected date
                    if (year === selectedDate.getFullYear() && month === selectedDate.getMonth() && i === selectedDate.getDate()) {
                        el.classList.add('selected');
                    }

                    grid.appendChild(el);
                }

                // Fill remaining to ensure exactly 42 slots (6 rows) for consistent height
                const totalCells = firstDay + daysInMonth;
                const remainingCells = 42 - totalCells;
                for (let i = 0; i < remainingCells; i++) {
                    const el = document.createElement('div');
                    el.className = 'calendar-day empty';
                    grid.appendChild(el);
                }

                calendarContainer.appendChild(grid);
            }

            // Format today's date for initial display
            const options = { weekday: 'long', month: 'short', day: 'numeric' };
            let initDateStr = selectedDate.toLocaleDateString('en-US', options);
            const d = selectedDate.getDate();
            const suffix = ["th", "st", "nd", "rd"][d % 10 > 3 ? 0 : (d % 100 - d % 10 != 10) * d % 10];
            dateDisplay.innerText = initDateStr.replace(d, d + suffix);

            renderCalendar();
            fetchSlots(selectedDate); // Initial load of slots for today

            // State variables for slot selection
            let currentSelectedSlotId = null;
            let currentSlotDataList = [];
            let currentFormattedDate = null;

            // Global mapping definitions (1hr 30min intervals)
            const SLOT_MAP = [
                { id: 1, time: '08:00 AM', label: 'Morning Shift Start' },
                { id: 2, time: '09:30 AM', label: 'Mid-morning Rush' },
                { id: 3, time: '11:00 AM', label: 'Pre-lunch Service' },
                { id: 4, time: '12:30 PM', label: 'Lunch Peak' },
                { id: 5, time: '02:00 PM', label: 'Post-lunch Session' },
                { id: 6, time: '03:30 PM', label: 'Late Afternoon' },
                { id: 7, time: '05:00 PM', label: 'Early Evening' },
                { id: 8, time: '06:30 PM', label: 'Commuter Rush' },
                { id: 9, time: '08:00 PM', label: 'Closing Slot' }
            ];

            async function fetchSlots(date) {
                const formattedDate = date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, '0') + "-" + String(date.getDate()).padStart(2, '0');
                try {
                    const response = await fetch('http://localhost:8081/api/v1/bookings/daily?date=' + formattedDate);
                    if (!response.ok) throw new Error("Failed to load slots");
                    const data = await response.json();
                    
                    // Save state for re-rendering during selection
                    currentSlotDataList = data;
                    currentFormattedDate = formattedDate;
                    currentSelectedSlotId = null; // reset selection on new date
                    
                    renderSlots();
                } catch (err) {
                    console.error(err);
                    document.getElementById('bookingSlotsContainer').innerHTML = '<p style="color:red; text-align:center; grid-column: 1/-1; padding: 32px;">Failed connecting to the Backend API. Make sure Spring Boot is running.</p>';
                }
            }

            function renderSlots() {
                const container = document.getElementById('bookingSlotsContainer');
                container.innerHTML = '';
                
                const now = new Date();
                const [year, month, day] = currentFormattedDate.split('-');
                
                SLOT_MAP.forEach(slotDef => {
                    const apiData = currentSlotDataList.find(s => s.timeSlot === slotDef.id);
                    const occupiedCount = apiData ? apiData.occupiedCount : 0;
                    const availableCount = 5 - occupiedCount;
                    const isFull = availableCount === 0;

                    let isPast = false;
                    const timeMatch = slotDef.time.match(/(\d+):(\d+)\s(AM|PM)/);
                    if (timeMatch) {
                        let hours = parseInt(timeMatch[1], 10);
                        const mins = parseInt(timeMatch[2], 10);
                        const ampm = timeMatch[3];
                        if (ampm === 'PM' && hours < 12) hours += 12;
                        if (ampm === 'AM' && hours === 12) hours = 0;
                        const slotDateTime = new Date(year, month - 1, day, hours, mins, 0);
                        if (slotDateTime < now) {
                            isPast = true;
                        }
                    }

                    const isUnavailable = isFull || isPast;
                    const isSelected = currentSelectedSlotId === slotDef.id;
                    
                    let badgeClass = "green";
                    let badgeText = "OPEN";
                    if (isPast) { badgeClass = "gray"; badgeText = "PASSED"; }
                    else if (occupiedCount >= 5) { badgeClass = "red"; badgeText = "FULL"; }
                    else if (occupiedCount >= 4) { badgeClass = "gray"; badgeText = "FINAL"; }
                    else if (occupiedCount >= 2) { badgeClass = "yellow"; badgeText = "BUSY"; }

                    // Build progress segments
                    let segmentsHtml = '';
                    for(let i=0; i<5; i++) {
                        const filledClass = (i < occupiedCount) ? "filled" : "";
                        const lockedClass = isUnavailable ? "locked" : "";
                        segmentsHtml += `<div class="segment ${filledClass} ${lockedClass}"></div>`;
                    }

                    const card = document.createElement('div');
                    card.className = "slot-card " + (isUnavailable ? "locked" : "");
                    if (isSelected && !isUnavailable) {
                        card.style.borderColor = '#2563eb';
                        card.style.boxShadow = '0 0 0 2px rgba(37,99,235,0.2)';
                        card.style.backgroundColor = '#f8fafc';
                    }
                    
                    if (!isUnavailable) {
                        // Hook up click handler to perform selection
                        card.style.cursor = 'pointer';
                        card.onclick = () => {
                            currentSelectedSlotId = slotDef.id;
                            renderSlots(); // Re-render to show selection box
                        };
                    }
                    
                    card.innerHTML = `
                        <div>
                            <div class="slot-header">
                                <div class="slot-time">${slotDef.time}</div>
                                <div class="badge ${badgeClass}">${badgeText}</div>
                            </div>
                            <div class="slot-label">${slotDef.label}</div>
                        </div>
                        <div>
                            <div class="occupancy-info" ${isUnavailable ? 'style="color: #cbd5e1;"' : ''}>
                                <span ${isUnavailable ? 'style="text-decoration: line-through;"' : ''}>Bay Occupancy</span>
                                <span ${isUnavailable ? 'style="color: #94a3b8;"' : ''}><strong>${isPast ? 'Unavailable' : availableCount + '/5 Available'}</strong></span>
                            </div>
                            <div class="progress-segments">
                                ${segmentsHtml}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            document.getElementById('bookSlotBtn').addEventListener('click', async () => {
                if (!currentSelectedSlotId) {
                    alert('Please select an available time slot from the calendar first.');
                    return;
                }
            
                const userDataString = localStorage.getItem('userProfile');
                if (!userDataString) {
                    alert("Please log in first to book a slot.");
                    window.location.href = 'index.html';
                    return;
                }
                
                // Navigate to the multi-step booking wizard with selected parameters
                window.location.href = `user_bookslot.html?date=${currentFormattedDate}&slot=${currentSelectedSlotId}`;
            });

            async function initUserLiveTracker() {
                const userDataStr = localStorage.getItem('userProfile');
                if (!userDataStr) return;
                const userData = JSON.parse(userDataStr);
                
                try {
                    const response = await fetch(`http://localhost:8081/api/v1/bookings/user/${userData.id}`);
                    if (!response.ok) return;
                    const bookings = await response.json();
                    
                    const today = new Date();
                    const formattedToday = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
                    
                    const activeBooking = bookings.find(b => 
                        b.bookingDate === formattedToday && 
                        b.status !== 'CANCELLED' && 
                        b.status !== 'COMPLETED'
                    );

                    if (activeBooking) {
                        const widget = document.getElementById('userLiveBayWidget');
                        const content = document.getElementById('userLiveBayContent');
                        widget.style.display = 'block';

                        const STAGES = [
                            { name: 'Pending', icon: '⧖', subtext: 'Awaiting arrival...', color: '#64748b' },
                            { name: 'Queued', icon: '≡', subtext: 'Next in line', color: '#d97706' },
                            { name: 'Washing', icon: '≈', subtext: 'High pressure wash', color: '#2563eb' },
                            { name: 'Drying', icon: '♨', subtext: 'Microfiber & air', color: '#0891b2' },
                            { name: 'Ready', icon: '★', subtext: 'Waiting for pickup', color: '#059669' },
                            { name: 'Completed', icon: '✓', subtext: 'Dispatched', color: '#7c3aed' }
                        ];

                        const stageIdx = activeBooking.currentStageIndex || 0;
                        const stage = STAGES[stageIdx];

                        content.innerHTML = `
                            <div style="background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase;">
                                    Bay ${activeBooking.bayId || '?'}
                                    <div style="width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 1.5px solid ${stage.color}; color: ${stage.color};">${stage.icon}</div>
                                </div>
                                <div style="font-size: 14px; font-weight: 700; color: ${stage.color}; margin-bottom: 2px;">${stage.name}</div>
                                <div style="font-size: 11px; color: #64748b;">${stage.subtext}</div>
                            </div>
                        `;
                        
                        // Auto-poll tracker
                        setTimeout(initUserLiveTracker, 5000);
                    } else {
                        document.getElementById('userLiveBayWidget').style.display = 'none';
                    }
                } catch(err) {
                    console.error("Live tracker error:", err);
                }
            }
        });
    </script>
</body>
</html>
