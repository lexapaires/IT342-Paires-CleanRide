<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CleanRide - Login</title>
</head>
<body>
    <!-- Animated background bubbles -->
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>

    <div class="container">
        <div class="logo-container">
            <div class="logo-wrapper">
                <img src="LOGO.png" alt="CleanRide Logo" class="logo-icon">
            </div>
            <h2>CleanRide</h2>
            <p class="subtitle">Welcome back! Please login.</p>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
        
        <div class="link-container">
            <p>Don't have an account?</p>
            <button class="link-btn" onclick="window.location.href='register.html'" type="button">Create an Account</button>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            try {
                const response = await fetch('http://localhost:8081/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                if (response.ok) {
                    const result = await response.text();
                    if (result === "ADMIN_LOGIN_SUCCESS") {
                        alert("Admin Login Successful!");
                        window.location.href = 'admin_dashboard.html';
                    } else {
                        // The backend now returns the User JSON object
                        const userData = JSON.parse(result);
                        localStorage.setItem('userProfile', JSON.stringify(userData));
                        alert("Login Successful!");
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    const result = await response.text();
                    alert("Error: " + result);
                }
            } catch (error) {
                alert("Could not connect to the server. Ensure your backend is running on port 8081.");
            }
        });
    </script>
</body>
</html>
