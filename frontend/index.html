<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CleanRide - Login</title>
</head>
<body>
<div class="container">
  <h2>CleanRide Login</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Log In</button>
  </form>
  <p style="text-align: center; margin-top: 15px;">
    Don't have an account? <br>
    <button onclick="window.location.href='register.html'" style="background-color: #6c757d; margin-top: 10px;">Register here</button>
  </p>
</div>

<script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            try {
                const response = await fetch('http://localhost:8081/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                if (response.ok) {
                    alert("Login Successful!");
                    window.location.href = 'dashboard.html';
                } else {
                    const result = await response.text();
                    alert("Error: " + result);
                }
            } catch (error) {
                alert("Could not connect to the server. Ensure your backend is running on port 8081.");
            }
        });
    </script>
</body>
</html>
