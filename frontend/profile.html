<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanRide - User Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        body {
            background: #f8fafc;
            padding: 0;
            display: flex;
            align-items: stretch;
        }
        .bubble { display: none; }
        
        .profile-container {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            margin-top: 24px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e2e8f0;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }

        .profile-role {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
        }

        .info-group {
            margin-bottom: 24px;
        }

        .info-label {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 16px;
            color: #0f172a;
            font-weight: 500;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .logout-btn {
            margin-top: 32px;
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background-color: #fee2e2;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand-placeholder">
            <div class="brand-logo"><img src="LOGO.png" alt="Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"></div>
            CleanRide
        </div>
        
        <div class="nav-section">
            <div class="nav-title">Main Menu</div>
            <a href="#" class="nav-link">Overview</a>
            <a href="dashboard.html" class="nav-link">Booking Calendar</a>
            <a href="my_bookings.html" class="nav-link">My Bookings</a>
            <a href="profile.html" class="nav-link active">Profile</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div class="header-title">
                <h1>User Profile</h1>
                <p>Manage your account details and preferences.</p>
            </div>
        </div>

        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar" id="profileInitials">J</div>
                <div>
                    <div class="profile-name" id="profileNameDisplay">John Doe</div>
                    <div class="profile-role">Customer Account</div>
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">Username</div>
                <div class="info-value" id="profileUsername">johndoe123</div>
            </div>

            <div class="info-group">
                <div class="info-label">Full Name</div>
                <div class="info-value" id="profileFullName">John Doe</div>
            </div>

            <div class="info-group">
                <div class="info-label">Email Address</div>
                <div class="info-value" id="profileEmail">johndoe@example.com</div>
            </div>

            <button class="logout-btn" onclick="logout()">Log out</button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userDataString = localStorage.getItem('userProfile');
            
            if (!userDataString) {
                // If there's no user data, they shouldn't be here
                window.location.href = 'index.html';
                return;
            }

            const userData = JSON.parse(userDataString);
            
            // Format Full Name
            const fullName = `${userData.firstName} ${userData.lastName}`;
            
            // Populate the UI
            document.getElementById('profileNameDisplay').innerText = fullName;
            document.getElementById('profileFullName').innerText = fullName;
            document.getElementById('profileUsername').innerText = userData.username;
            document.getElementById('profileEmail').innerText = userData.email;
            
            // Get initial for avatar (first letter of first name)
            if (userData.firstName && userData.firstName.length > 0) {
                document.getElementById('profileInitials').innerText = userData.firstName.charAt(0).toUpperCase();
            }
        });

        function logout() {
            localStorage.removeItem('userProfile');
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
