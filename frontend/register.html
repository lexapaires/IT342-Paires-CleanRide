<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CleanRide - Register</title>
</head>
<body>
    <!-- Animated background bubbles -->
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>

    <div class="container">
        <div class="logo-container">
            <div class="logo-wrapper">
                <img src="LOGO.png" alt="CleanRide Logo" class="logo-icon">
            </div>
            <h2>Join CleanRide</h2>
            <p class="subtitle">Create your account today.</p>
        </div>
        
        <form id="registerForm">
            <div class="input-row">
                <div class="input-group">
                    <input type="text" id="firstName" placeholder="First Name" required>
                </div>
                <div class="input-group">
                    <input type="text" id="lastName" placeholder="Last Name" required>
                </div>
            </div>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <input type="date" id="birthdate" required title="Birthdate">
            </div>
            <button type="submit">Create Account</button>
        </form>
        
        <div class="link-container">
            <p>Already have an account?</p>
            <button class="link-btn" onclick="window.location.href='index.html'" type="button">Log In Here</button>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                birthdate: document.getElementById('birthdate').value
            };
            const response = await fetch('http://localhost:8081/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            const result = await response.text();
            alert(result);
            if (response.ok) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
